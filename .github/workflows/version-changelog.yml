name: Auto Version & Changelog

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-metadata:
    name: Generate Version and Changelog
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate release metadata
        run: npm run version:auto

      - name: Detect metadata changes
        id: changes
        run: |
          FILES="package.json package-lock.json CHANGELOG.md public/version.json public/changelog.json"
          if [ -n "$(git status --porcelain -- $FILES)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and tag release metadata
        if: steps.changes.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.changes.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json CHANGELOG.md public/version.json public/changelog.json
          git commit -m "chore(release): v${VERSION} [skip ci]"

          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            git tag "v${VERSION}"
          fi

          git push origin HEAD:main

          if ! git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            git push origin "v${VERSION}"
          fi

      - name: Release metadata summary
        run: |
          echo "## Auto Version & Changelog" >> "$GITHUB_STEP_SUMMARY"
          echo "| Champ | Valeur |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fichiers modifiés | ${{ steps.changes.outputs.changed }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "| Nouvelle version | v${{ steps.changes.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          fi
