name: Build and Deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement à déployer'
        required: true
        type: choice
        options:
          - cjd80
          - rep
          - both
      force_build:
        description: 'Forcer le rebuild même sans changements'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUN_VERSION: 1.1.38

jobs:
  # ===================================
  # Job 1: Détection des changements
  # ===================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.changes.outputs.should_build }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect file changes
        id: changes
        run: |
          if [ "${{ github.event.inputs.force_build }}" == "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "🔄 Force rebuild activé"
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD^ HEAD 2>/dev/null || echo "")
          echo "Fichiers modifiés:"
          echo "$CHANGED"

          SHOULD_BUILD=false
          while IFS= read -r file; do
            case "$file" in
              app/*|public/*|next.config.*|server/*|migrations/*|shared/*|package.json|bun.lockb|Dockerfile*|docker-compose*.yml|deploy/docker-compose*.yml)
                SHOULD_BUILD=true
                break
                ;;
            esac
          done <<< "$CHANGED"

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "📊 Build nécessaire: $SHOULD_BUILD"

  # ===================================
  # Job 2: Build et push image Docker
  # ===================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: detect-changes
    if: needs.detect-changes.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_TAG=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Build summary
        run: |
          echo "## Build réussi" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===================================
  # Job 3: Validation migrations (CI)
  # Tourne en parallèle du build — bloque le déploiement si les SQL sont cassés
  # ===================================
  validate-migrations:
    name: Validate DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: needs.detect-changes.outputs.should_build == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ciuser
          POSTGRES_PASSWORD: cipassword
          POSTGRES_DB: cidb
        options: >-
          --health-cmd "pg_isready -U ciuser -d cidb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Valider migrations sur DB vierge
        env:
          DATABASE_URL: postgres://ciuser:cipassword@localhost:5432/cidb
          MIGRATIONS_DIR: ./migrations
          SKIP_HISTORICAL_SEED: "true"
        run: |
          echo "🧪 Exécution de toutes les migrations sur PostgreSQL 16 vierge..."
          sh scripts/run-migrations.sh

      - name: Vérifier tables critiques
        env:
          DATABASE_URL: postgres://ciuser:cipassword@localhost:5432/cidb
        run: |
          echo "🔍 Vérification des tables critiques..."
          TABLES=$(psql "$DATABASE_URL" -t -c \
            "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;" \
            | tr -d ' ' | grep -v '^$')

          echo "Tables créées:"
          echo "$TABLES" | sed 's/^/  /'

          CRITICAL="members admins"
          FAIL=0
          for table in $CRITICAL; do
            if echo "$TABLES" | grep -qx "$table"; then
              echo "  ✅ $table"
            else
              echo "  ❌ $table MANQUANTE"
              FAIL=1
            fi
          done

          APPLIED=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(*) FROM _drizzle_migrations;" | tr -d ' \n')
          TOTAL=$(echo "$TABLES" | wc -l | tr -d ' ')
          echo ""
          echo "📊 $APPLIED migrations appliquées — $TOTAL tables créées"

          if [ "$FAIL" -eq 1 ]; then
            echo "❌ Tables critiques manquantes — déploiement bloqué"
            exit 1
          fi

      - name: Migration summary
        if: always()
        env:
          DATABASE_URL: postgres://ciuser:cipassword@localhost:5432/cidb
        run: |
          APPLIED=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(*) FROM _drizzle_migrations;" 2>/dev/null \
            | tr -d ' \n' || echo "N/A")
          STATUS="${{ job.status == 'success' && '✅ OK' || '❌ ÉCHEC' }}"
          echo "## Validation migrations" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Statut | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations appliquées | $APPLIED |" >> $GITHUB_STEP_SUMMARY
          echo "| DB de test | PostgreSQL 16-alpine |" >> $GITHUB_STEP_SUMMARY

  # ===================================
  # Job 4: Deploy CJD80 (cjd80.fr)
  # ===================================
  deploy-cjd80:
    name: Deploy CJD80 (cjd80.fr)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-changes, build, validate-migrations]
    if: |
      always() &&
      (needs.validate-migrations.result == 'success' || needs.validate-migrations.result == 'skipped') &&
      (needs.build.result == 'success' || needs.detect-changes.outputs.should_build == 'false') &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.environment == 'cjd80' || github.event.inputs.environment == 'both')))

    environment:
      name: cjd80
      url: https://cjd80.fr

    steps:
      - name: Skip (aucun changement)
        if: needs.detect-changes.outputs.should_build == 'false'
        run: echo "⏭️ Aucun changement détecté — déploiement ignoré"

      - name: Deploy to CJD80
        if: needs.detect-changes.outputs.should_build == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /docker/cjd80

            echo "🔐 Login GHCR..."
            echo "${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Sauvegarder l'image actuelle pour rollback
            OLD_IMAGE=$(docker inspect cjd-app --format='{{.Image}}' 2>/dev/null || echo "")
            echo "Image actuelle: ${OLD_IMAGE:-aucune}"

            echo "📥 Pull image par digest (immuable)..."
            docker pull "ghcr.io/${{ github.repository }}@${{ needs.build.outputs.image-digest }}"
            docker tag  "ghcr.io/${{ github.repository }}@${{ needs.build.outputs.image-digest }}" cjd80:latest

            echo "🚀 Déploiement..."
            docker compose up -d --no-deps --force-recreate cjd-app

            echo "⏳ Attente démarrage NestJS (max 90s)..."
            for i in $(seq 1 18); do
              STATE=$(docker inspect --format='{{.State.Status}}' cjd-app 2>/dev/null || echo "not_found")
              if [ "$STATE" != "running" ]; then
                echo "  ⏳ Tentative $i/18 — container état: $STATE"
                sleep 5
                continue
              fi
              HEALTH=$(docker exec cjd-app wget -q -O - --timeout=5 \
                http://localhost:5000/api/health 2>/dev/null || echo "")
              if echo "$HEALTH" | grep -q '"status":"healthy"'; then
                echo "  ✅ NestJS prêt après $((i * 5))s"
                break
              fi
              echo "  ⏳ Tentative $i/18 — backend pas encore prêt..."
              sleep 5
            done

            # Vérifier état final
            CONTAINER_STATE=$(docker inspect --format='{{.State.Status}}' cjd-app 2>/dev/null || echo "not_found")
            RESTART_COUNT=$(docker inspect --format='{{.RestartCount}}' cjd-app 2>/dev/null || echo "0")

            if [ "$CONTAINER_STATE" != "running" ] || [ "$RESTART_COUNT" -gt "0" ]; then
              echo "❌ Container instable (état=$CONTAINER_STATE, restarts=$RESTART_COUNT)"
              docker logs cjd-app --tail 80 || true
              # Rollback vers l'image précédente
              if [ -n "$OLD_IMAGE" ]; then
                echo "🔄 Rollback vers $OLD_IMAGE..."
                docker tag "$OLD_IMAGE" cjd80:latest
                docker compose up -d --no-deps --force-recreate cjd-app
                echo "✅ Rollback effectué"
              fi
              exit 1
            fi

            echo "🔍 Smoke tests..."
            FAIL=0

            # Health check avec validation JSON
            HEALTH=$(docker exec cjd-app wget -q -O - --timeout=10 \
              http://localhost:5000/api/health 2>/dev/null || echo "FAILED")
            if echo "$HEALTH" | grep -q '"status":"healthy"'; then
              echo "  ✅ GET /api/health → healthy"
            else
              echo "  ❌ GET /api/health → $(echo "$HEALTH" | head -c 200)"
              FAIL=1
            fi

            # Endpoints API (401 attendu, 5xx = erreur)
            check_endpoint() {
              local name="$1" url="$2"
              local status
              status=$(docker exec cjd-app wget -S -O /dev/null --timeout=10 "$url" 2>&1 \
                | grep "HTTP/" | tail -1 | awk '{print $2}' || echo "000")
              if [ "${status:0:1}" = "5" ] || [ "$status" = "000" ]; then
                echo "  ❌ $name → HTTP $status"
                FAIL=1
              else
                echo "  ✅ $name → HTTP $status"
              fi
            }

            check_endpoint "GET /api/admin/members"                  "http://localhost:5000/api/admin/members"
            check_endpoint "GET /api/admin/events"                   "http://localhost:5000/api/admin/events"
            check_endpoint "GET /api/admin/ideas"                    "http://localhost:5000/api/admin/ideas"
            check_endpoint "GET /api/admin/federation/overview"      "http://localhost:5000/api/admin/federation/overview"
            check_endpoint "GET /api/admin/federation/organizations" "http://localhost:5000/api/admin/federation/organizations"
            check_endpoint "GET /api/admin/federation/syndications"  "http://localhost:5000/api/admin/federation/syndications"
            check_endpoint "GET /api/patrons"                        "http://localhost:5000/api/patrons"

            if [ "$FAIL" -eq 1 ]; then
              echo "❌ Smoke tests échoués — rollback..."
              docker logs cjd-app --tail 80 || true
              if [ -n "$OLD_IMAGE" ]; then
                docker tag "$OLD_IMAGE" cjd80:latest
                docker compose up -d --no-deps --force-recreate cjd-app
                echo "✅ Rollback effectué"
              fi
              exit 1
            fi

            echo "✅ Déploiement CJD80 réussi!"
            docker image prune -f || true

      - name: Deployment summary
        if: needs.detect-changes.outputs.should_build == 'true'
        run: |
          echo "## Déploiement CJD80 réussi" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://cjd80.fr |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ needs.build.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===================================
  # Job 4: Deploy REP (repicardie.fr)
  # ===================================
  deploy-rep:
    name: Deploy REP (repicardie.fr)
    runs-on: [self-hosted, rep]
    timeout-minutes: 15
    needs: [detect-changes, build, validate-migrations]
    if: |
      always() &&
      (needs.validate-migrations.result == 'success' || needs.validate-migrations.result == 'skipped') &&
      (needs.build.result == 'success' || needs.detect-changes.outputs.should_build == 'false') &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.environment == 'rep' || github.event.inputs.environment == 'both')))

    environment:
      name: rep
      url: https://repicardie.fr

    steps:
      - name: Skip (aucun changement)
        if: needs.detect-changes.outputs.should_build == 'false'
        run: echo "⏭️ Aucun changement détecté — déploiement ignoré"

      - name: Pull latest code
        if: needs.detect-changes.outputs.should_build == 'true'
        run: |
          cd /docker/apps/komuno
          git config --global --add safe.directory /docker/apps/komuno
          git fetch --all --prune
          git checkout main
          git pull --ff-only

      - name: Pull and deploy
        if: needs.detect-changes.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          cd /docker/apps/komuno

          echo "🧷 Verrouillage des variables de routage REP..."
          touch .env
          if grep -q '^DOMAIN=' .env; then
            sed -i 's#^DOMAIN=.*#DOMAIN=repicardie.fr#' .env
          else
            echo 'DOMAIN=repicardie.fr' >> .env
          fi
          if grep -q '^APP_NAME=' .env; then
            sed -i 's#^APP_NAME=.*#APP_NAME=rep-app#' .env
          else
            echo 'APP_NAME=rep-app' >> .env
          fi
          echo "✅ DOMAIN=$(grep '^DOMAIN=' .env | cut -d= -f2)"
          echo "✅ APP_NAME=$(grep '^APP_NAME=' .env | cut -d= -f2)"

          # Détecter automatiquement le fichier compose de production disponible
          COMPOSE_FILE=""
          for f in docker-compose.prod.yml docker-compose.yml compose.yml; do
            if [ -f "$f" ]; then
              COMPOSE_FILE="$f"
              break
            fi
          done
          if [ -z "$COMPOSE_FILE" ]; then
            echo "❌ Aucun fichier compose de production trouvé dans /docker/apps/komuno"
            echo "   Fichiers attendus: docker-compose.prod.yml | docker-compose.yml | compose.yml"
            ls -la
            exit 1
          fi
          echo "📄 Compose détecté: $COMPOSE_FILE"

          # Garantir les réseaux externes requis par le compose (ex: traefik_public)
          if grep -q "traefik_public" "$COMPOSE_FILE"; then
            if ! docker network inspect traefik_public >/dev/null 2>&1; then
              echo "🛠️ Réseau externe manquant: traefik_public — création..."
              docker network create traefik_public
            else
              echo "✅ Réseau externe présent: traefik_public"
            fi

            # Auto-réparation: connecter le container Traefik à ce réseau si nécessaire
            TRAEFIK_CONTAINER=$(docker ps --format '{{.Names}}' | grep -E '(^|-)traefik($|-)' | head -n1 || true)
            if [ -n "${TRAEFIK_CONTAINER:-}" ]; then
              if ! docker inspect "$TRAEFIK_CONTAINER" --format '{{json .NetworkSettings.Networks}}' | grep -q '"traefik_public"'; then
                echo "🛠️ Traefik non connecté à traefik_public — connexion de $TRAEFIK_CONTAINER..."
                docker network connect traefik_public "$TRAEFIK_CONTAINER" || true
              else
                echo "✅ Traefik déjà connecté à traefik_public ($TRAEFIK_CONTAINER)"
              fi
            else
              echo "⚠️ Aucun container Traefik détecté sur cet hôte runner"
            fi
          fi

          # Détecter automatiquement le service à redéployer
          SERVICE_NAME=""
          SERVICES=$(docker compose -f "$COMPOSE_FILE" config --services)
          for svc in app rep-app cjd-app cjd80-app; do
            if echo "$SERVICES" | grep -qx "$svc"; then
              SERVICE_NAME="$svc"
              break
            fi
          done
          if [ -z "$SERVICE_NAME" ]; then
            SERVICE_NAME=$(echo "$SERVICES" | head -n 1)
          fi
          if [ -z "$SERVICE_NAME" ]; then
            echo "❌ Aucun service détecté dans $COMPOSE_FILE"
            exit 1
          fi
          echo "🧩 Service détecté: $SERVICE_NAME"

          # Inclure automatiquement les dépendances techniques si elles existent
          DEPLOY_TARGETS="$SERVICE_NAME"
          for dep in postgres redis minio; do
            if echo "$SERVICES" | grep -qx "$dep"; then
              DEPLOY_TARGETS="$DEPLOY_TARGETS $dep"
            fi
          done
          echo "📦 Services déployés: $DEPLOY_TARGETS"

          echo "🔐 Login GHCR..."
          echo "${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Sauvegarder l'image actuelle pour rollback
          OLD_IMAGE=$(docker inspect rep-app --format='{{.Image}}' 2>/dev/null || echo "")
          echo "Image actuelle: ${OLD_IMAGE:-aucune}"

          echo "📥 Pull image par digest (immuable)..."
          IMAGE_REF="ghcr.io/${{ github.repository }}@${{ needs.build.outputs.image-digest }}"
          COMPOSE_IMAGE="ghcr.io/${{ github.repository }}:latest"
          docker pull "$IMAGE_REF"
          docker tag  "$IMAGE_REF" komuno:latest
          docker tag  "$IMAGE_REF" "$COMPOSE_IMAGE"

          echo "🚀 Déploiement..."
          docker compose -f "$COMPOSE_FILE" up -d --force-recreate $DEPLOY_TARGETS
          CONTAINER_ID=$(docker compose -f "$COMPOSE_FILE" ps -q "$SERVICE_NAME")
          if [ -z "$CONTAINER_ID" ]; then
            echo "❌ Impossible de récupérer le container pour $SERVICE_NAME"
            exit 1
          fi

          health_ready() {
            local p
            for p in 5000 3000; do
              if docker exec "$CONTAINER_ID" wget -q -O - --timeout=5 "http://localhost:${p}/api/health" 2>/dev/null | grep -q '"status":"healthy"'; then
                return 0
              fi
              if docker exec "$CONTAINER_ID" wget -q -O - --timeout=5 "http://localhost:${p}/health" 2>/dev/null | grep -qi 'ok\\|healthy'; then
                return 0
              fi
            done
            return 1
          }

          echo "⏳ Attente démarrage backend (max 90s)..."
          for i in $(seq 1 18); do
            STATE=$(docker inspect --format='{{.State.Status}}' "$CONTAINER_ID" 2>/dev/null || echo "not_found")
            if [ "$STATE" != "running" ]; then
              echo "  ⏳ Tentative $i/18 — container état: $STATE"
              sleep 5
              continue
            fi
            if health_ready; then
              echo "  ✅ NestJS prêt après $((i * 5))s"
              break
            fi
            echo "  ⏳ Tentative $i/18 — backend pas encore prêt..."
            sleep 5
          done

          # Vérifier état final
          CONTAINER_STATE=$(docker inspect --format='{{.State.Status}}' "$CONTAINER_ID" 2>/dev/null || echo "not_found")
          RESTART_COUNT=$(docker inspect --format='{{.RestartCount}}' "$CONTAINER_ID" 2>/dev/null || echo "0")

          # Tolérance d'un redémarrage ponctuel au bootstrap (migration / init services)
          if [ "$CONTAINER_STATE" != "running" ] || [ "$RESTART_COUNT" -gt "1" ]; then
            echo "❌ Container instable (état=$CONTAINER_STATE, restarts=$RESTART_COUNT)"
            docker logs "$CONTAINER_ID" --tail 80 || true
            if [ -n "$OLD_IMAGE" ]; then
              echo "🔄 Rollback vers $OLD_IMAGE..."
              docker tag "$OLD_IMAGE" komuno:latest
              docker tag "$OLD_IMAGE" "ghcr.io/${{ github.repository }}:latest"
              docker compose -f "$COMPOSE_FILE" up -d --force-recreate $DEPLOY_TARGETS
              echo "✅ Rollback effectué"
            fi
            exit 1
          fi

          echo "🔍 Smoke tests..."
          FAIL=0

          # Health check multi-ports multi-endpoints
          if health_ready; then
            echo "  ✅ Health endpoint → healthy"
          else
            echo "  ❌ Aucun endpoint health valide trouvé (ports 5000/3000)"
            FAIL=1
          fi

          # Endpoints API (401 attendu, 5xx = erreur)
          check_endpoint() {
            local name="$1" url="$2"
            local status
            status=$(docker exec "$CONTAINER_ID" wget -S -O /dev/null --timeout=10 "$url" 2>&1 \
              | grep "HTTP/" | tail -1 | awk '{print $2}' || echo "000")
            if [ "${status:0:1}" = "5" ] || [ "$status" = "000" ]; then
              echo "  ❌ $name → HTTP $status"
              FAIL=1
            else
              echo "  ✅ $name → HTTP $status"
            fi
          }

          check_endpoint "GET /api/admin/members"                  "http://localhost:5000/api/admin/members"
          check_endpoint "GET /api/admin/events"                   "http://localhost:5000/api/admin/events"
          check_endpoint "GET /api/admin/ideas"                    "http://localhost:5000/api/admin/ideas"
          check_endpoint "GET /api/admin/federation/overview"      "http://localhost:5000/api/admin/federation/overview"
          check_endpoint "GET /api/admin/federation/organizations" "http://localhost:5000/api/admin/federation/organizations"
          check_endpoint "GET /api/admin/federation/syndications"  "http://localhost:5000/api/admin/federation/syndications"
          check_endpoint "GET /api/patrons"                        "http://localhost:5000/api/patrons"

          if [ "$FAIL" -eq 1 ]; then
            echo "❌ Smoke tests échoués — rollback..."
            docker logs "$CONTAINER_ID" --tail 80 || true
            if [ -n "$OLD_IMAGE" ]; then
              docker tag "$OLD_IMAGE" komuno:latest
              docker tag "$OLD_IMAGE" "ghcr.io/${{ github.repository }}:latest"
              docker compose -f "$COMPOSE_FILE" up -d --force-recreate $DEPLOY_TARGETS
              echo "✅ Rollback effectué"
            fi
            exit 1
          fi

          echo "🌐 Smoke tests publics (depuis runner REP)..."
          PUBLIC_FAIL=0

          check_public() {
            local name="$1" url="$2" expected="$3" attempts="${4:-18}" delay="${5:-5}"
            local status
            for i in $(seq 1 "$attempts"); do
              status=$(curl -sS -o /dev/null --max-time 20 -w "%{http_code}" "$url" || echo "000")
              if [[ "$status" =~ $expected ]]; then
                echo "  ✅ $name → HTTP $status (tentative $i/$attempts)"
                return 0
              fi
              echo "  ⏳ $name → HTTP $status (tentative $i/$attempts), attente Traefik..."
              sleep "$delay"
            done
            echo "  ❌ $name → HTTP $status après $attempts tentatives"
            PUBLIC_FAIL=1
          }

          # Root doit répondre 2xx/3xx ; health doit répondre 200 strict.
          # Traefik peut prendre quelques dizaines de secondes à recharger les labels après recréation.
          check_public "GET /"             "https://repicardie.fr/"            "^(2|3)[0-9][0-9]$"
          check_public "GET /api/health"   "https://repicardie.fr/api/health"  "^200$"

          if [ "$PUBLIC_FAIL" -eq 1 ]; then
            echo "❌ Smoke tests publics échoués — rollback..."
            docker logs "$CONTAINER_ID" --tail 80 || true
            if [ -n "$OLD_IMAGE" ]; then
              docker tag "$OLD_IMAGE" komuno:latest
              docker tag "$OLD_IMAGE" "ghcr.io/${{ github.repository }}:latest"
              docker compose -f "$COMPOSE_FILE" up -d --force-recreate $DEPLOY_TARGETS
              echo "✅ Rollback effectué"
            fi
            exit 1
          fi

          echo "✅ Déploiement REP réussi!"
          docker image prune -f || true

      - name: Deployment summary
        if: needs.detect-changes.outputs.should_build == 'true'
        run: |
          echo "## Déploiement REP réussi" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://repicardie.fr |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ needs.build.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
