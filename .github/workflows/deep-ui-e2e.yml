name: Deep UI E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test'
        required: false
        default: 'https://demo.komuno.org'
  schedule:
    # Nightly smoke against the isolated demo instance (03:30 UTC on weekdays).
    - cron: '30 3 * * 1-5'

concurrency:
  group: deep-ui-e2e-${{ github.event.inputs.base_url || 'demo' }}
  cancel-in-progress: false

jobs:
  deep-ui-e2e:
    name: Deep UI workflows
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun x playwright install --with-deps chromium

      - name: Wait outside demo reset window
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://demo.komuno.org' }}
        run: |
          if [[ "$E2E_BASE_URL" != *"demo.komuno.org"* ]]; then
            exit 0
          fi

          minute=$((10#$(date -u +%M)))
          sleep_seconds=0
          if [ "$minute" -ge 55 ]; then
            sleep_seconds=$(((66 - minute) * 60))
          elif [ "$minute" -le 5 ]; then
            sleep_seconds=$(((6 - minute) * 60))
          fi

          if [ "$sleep_seconds" -gt 0 ]; then
            echo "Demo reset window detected at minute $minute UTC; sleeping ${sleep_seconds}s before E2E."
            sleep "$sleep_seconds"
          fi

      - name: Preflight demo availability
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://demo.komuno.org' }}
        run: |
          for attempt in {1..36}; do
            if curl --retry 2 --retry-delay 2 --retry-connrefused -fsS "$E2E_BASE_URL/api/version" >/dev/null \
              && curl --retry 2 --retry-delay 2 --retry-connrefused -fsS "$E2E_BASE_URL/propose" >/dev/null; then
              echo "Preflight OK on attempt $attempt"
              exit 0
            fi
            echo "Preflight not ready yet (attempt $attempt/36), retrying..."
            sleep 10
          done
          echo "Preflight failed for $E2E_BASE_URL" >&2
          exit 1

      - name: Run deep UI workflow checks
        env:
          E2E_DEEP_UI: '1'
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://demo.komuno.org' }}
        run: bun x playwright test tests/e2e/ui-workflows-deep.spec.ts --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: deep-ui-e2e-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
