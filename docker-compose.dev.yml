# Docker Compose for Development - CJD80 on work.robinswood.io

services:
  cjd80-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cjd80-app
    restart: unless-stopped

    ports:
      - "5003:5000"  # Expose on port 5003 locally

    env_file:
      - .env

    environment:
      - NODE_ENV=production
      - PORT=5000

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    volumes:
      - ./logs:/app/logs

    networks:
      - traefik_public
      - rbw-network
      - cjd80-dev-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.komuno-dev.rule=Host(`komuno.rbw.ovh`)"
      - "traefik.http.routers.komuno-dev.entrypoints=websecure"
      - "traefik.http.routers.komuno-dev.tls=true"
      - "traefik.http.routers.komuno-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.komuno-dev.loadbalancer.server.port=3000"

networks:
  traefik_public:
    external: true
  rbw-network:
    driver: bridge
  cjd80-dev-network:
    external: true
    name: cjd80_cjd80-dev-network
